services:
  - type: web
    name: oceangpt-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL_NAME
        value: BAAI/bge-small-en-v1.5
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NOAA_APPLICATION_NAME
        value: OceanGPT
